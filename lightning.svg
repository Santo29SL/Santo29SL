<svg xmlns="http://w3.org" viewBox="0 0 24 24" width="100" height="100">
  <style>
    .lightning {
      fill: #FFD700; /* Yellow color */
      cursor: pointer;
      transition: transform 0.1s ease-in-out;
    }
    /* Flashes and shakes on hover */
    .lightning:hover {
      animation: strike 0.2s infinite;
      fill: #FFFFFF; /* Turns white like real lightning */
      filter: drop-shadow(0 0 8px #FFD700);
    }
    @keyframes strike {
      0% { transform: translate(0, 0) scale(1); }
      20% { transform: translate(-2px, 2px) scale(1.1); }
      40% { transform: translate(2px, -1px) scale(1.05); }
      60% { transform: translate(-1px, -2px) scale(1.1); }
      80% { transform: translate(2px, 1px) scale(1.05); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
  <path class="lightning" d="M11 21h-1l1-7H7.5c-.6 0-1-.4-1-1 0-.2.1-.4.2-.5l6-9c.3-.5.9-.6 1.4-.3.2.1.3.3.4.5h1l-1 7H16.5c.6 0 1 .4 1 1 0 .2-.1.4-.2.5l-6 9c-.3.5-.9.6-1.4.3-.2-.1-.3-.3-.4-.5z"/>
</svg>
